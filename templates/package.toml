#displayed application name
name = "myApp"

#unique identifier for component, all lower case, persists between versions
slug = "myApp"

#application type
# ["collaboration", "connector", "app", "experience", "extension"]
kind = "app"

version = "4.0.1"

#packages for application based on OS
# ["windows-x86", "windows-x86_64", "windows-aarch64", "linux-x86", "linux-x86_64", "linux-aarch64"]
[[package.windows-x86_64.packman]]
name = "package1"
url = "https://myBucket.s3.amazonaws.com/packman/package1/4.0.1/windows-x86_64/package.zip"
location = "${base}"

[[package.windows-aarch64.packman]]
name = "package1"
url = "https://myBucket.s3.amazonaws.com/packman/package1/4.0.1/windows-aarch64/package.zip"
location = "${base}"

[[package.windows-aarch64.packman]]
name = "package2"
url = "https://myBucket.s3.amazonaws.com/packman/package2/1.0.1/windows-aarch64/package.zip"
location = "${base}"

[[package.linux-x86_64.packman]]
name = "package1"
url = "https://myBucket.s3.amazonaws.com/packman/package1/4.0.1/linux-x86_64/package.zip"
location = "${base}"

[[package.linux-aarch64.packman]]
name = "package1"
url = "https://myBucket.s3.amazonaws.com/packman/package2/4.0.1/linux-aarch64/package.zip"
location = "${base}"

# Images is a zip of your icon.png, image.png, feature.png, and background.png.
# PNG format is required and naming should be exact
# Required Image zips
# image.png: 1920x1080
# background.png: 1920x1080
# featured.png: 175x273
# icon.png: 32x32
# Not Required (will be created from image)
# card.png: 220x1243
[images]
name = "packmanImagePackageNameThatIncludesBackgroundimgImageimgAndIconimageAsPNG"
url = "https://myBucket.s3.amazonaws.com/packman/package3/4.0.1/images/package.zip"
